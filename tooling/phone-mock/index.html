<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>DRC Pay — merchant app mock</title>
<style>
  :root{
    --coral:#FF6B5B; --coral-dark:#E2553F; --cream:#FFFCF8; --charcoal:#1A1A1A;
    --muted:#5A5A57; --border:#ECE8E1; --surface:#FFFFFF;
    --success:#1E8E5A; --error:#D64541; --warning:#C77700;
  }
  *{box-sizing:border-box;font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;}
  body{margin:0;min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;
       gap:16px;background:#1f2933;padding:24px;}
  .stage{display:flex;gap:22px;align-items:flex-start;flex-wrap:wrap;justify-content:center;}
  .hint{color:#aeb6bf;font-size:12.5px;max-width:880px;text-align:center;line-height:1.5;}
  .hint code{background:#2b3640;color:#dfe6ec;padding:1px 5px;border-radius:4px;}
  .phone{width:390px;max-width:96vw;height:800px;max-height:92vh;background:var(--cream);border-radius:42px;
         box-shadow:0 18px 60px rgba(0,0,0,.45);overflow:hidden;display:flex;flex-direction:column;
         border:10px solid #0c0f12;position:relative;}
  .notch{position:absolute;top:0;left:50%;transform:translateX(-50%);width:150px;height:26px;background:#0c0f12;
         border-radius:0 0 16px 16px;z-index:5;}
  .screen{flex:1;display:flex;flex-direction:column;padding:50px 20px 20px;overflow-y:auto;}
  .badge{position:absolute;top:40px;right:14px;background:#0c0f12;color:#9aa6b2;font-size:9px;letter-spacing:.08em;
         padding:3px 7px;border-radius:6px;z-index:6;}
  .langtog{position:absolute;top:38px;left:14px;z-index:6;display:flex;border:1px solid var(--border);
           border-radius:8px;overflow:hidden;background:var(--surface);}
  .langtog button{border:none;background:transparent;padding:4px 10px;font-size:11px;font-weight:700;
           color:var(--muted);cursor:pointer;}
  .langtog button.active{background:var(--coral);color:#fff;}
  label{display:block;font-size:12px;color:var(--muted);margin:12px 0 5px;font-weight:600;letter-spacing:.02em;}
  input,select{width:100%;padding:12px 14px;border:1px solid var(--border);border-radius:12px;font-size:16px;
        background:var(--surface);color:var(--charcoal);outline:none;}
  input:focus,select:focus{border-color:var(--coral);}
  .mpick{margin-bottom:6px;}
  button.cta{margin-top:14px;width:100%;padding:14px;border:none;border-radius:14px;background:var(--coral);
        color:#fff;font-size:16px;font-weight:700;cursor:pointer;}
  button.cta:active{background:var(--coral-dark);}
  button.cta:disabled{opacity:.6;cursor:default;}
  /* QR hero */
  .hero{text-align:center;margin-top:4px;}
  .hero h1{font-size:20px;color:var(--charcoal);margin:6px 0 2px;}
  .hero .qrwrap{width:200px;height:200px;margin:10px auto 6px;background:#fff;border:1px solid var(--border);
        border-radius:16px;padding:12px;display:flex;align-items:center;justify-content:center;}
  .hero .qrwrap img{width:100%;height:100%;}
  .hero .till{font:700 18px "SF Mono",Menlo,Consolas,monospace;color:var(--charcoal);letter-spacing:.04em;}
  .hero .cap{color:var(--muted);font-size:12.5px;margin:6px 0 0;line-height:1.45;}
  /* panels */
  details.panel{margin-top:16px;border:1px solid var(--border);border-radius:14px;background:var(--surface);
        padding:0 14px;}
  details.panel>summary{cursor:pointer;list-style:none;padding:13px 0;font-weight:700;font-size:13.5px;
        color:var(--charcoal);display:flex;align-items:center;gap:8px;}
  details.panel>summary::-webkit-details-marker{display:none;}
  details.panel>summary::before{content:"▸";color:var(--coral);font-size:12px;}
  details.panel[open]>summary::before{content:"▾";}
  details.panel .body{padding:0 0 14px;}
  .out{margin-top:12px;font-size:13px;padding:10px 12px;border-radius:10px;background:#f3efe7;color:var(--charcoal);
        white-space:pre-wrap;line-height:1.5;}
  .out.ok{background:#e7f6ee;color:#136c44;} .out.bad{background:#fdeceb;color:#a5302c;}
  /* feed */
  .feed{margin-top:18px;}
  .feed-head{display:flex;align-items:center;justify-content:space-between;font-weight:700;font-size:13.5px;
        color:var(--charcoal);margin-bottom:8px;}
  .feed-head button{border:1px solid var(--border);background:var(--surface);border-radius:8px;cursor:pointer;
        font-size:14px;padding:2px 8px;color:var(--muted);}
  .feed ul{list-style:none;padding:0;margin:0;}
  .feed li{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;border:1px solid var(--border);
        border-radius:12px;background:var(--surface);margin-bottom:8px;font-size:13.5px;}
  .feed li .who{color:var(--muted);font-size:12px;}
  .feed li .amt{font-weight:700;color:var(--charcoal);}
  .pill{font-size:10.5px;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.02em;}
  .pill.ok{background:#e7f6ee;color:#136c44;} .pill.bad{background:#fdeceb;color:#a5302c;}
  .pill.wait{background:#fff4e0;color:#9a6b2f;}
  .feed .empty{color:var(--muted);font-size:12.5px;font-style:italic;padding:6px 2px;}
  .err{color:var(--error);font-size:12.5px;margin-top:10px;text-align:center;}
  .hidden{display:none;}
  /* operations console */
  .console{width:440px;max-width:96vw;height:800px;max-height:92vh;background:#0b0f13;border-radius:18px;
        border:1px solid #1d2730;display:flex;flex-direction:column;overflow:hidden;box-shadow:0 18px 60px rgba(0,0,0,.45);}
  .console-head{padding:14px 18px;border-bottom:1px solid #1d2730;display:flex;align-items:center;}
  .console-head .lights{width:10px;height:10px;border-radius:50%;background:#ff5f57;
        box-shadow:16px 0 0 #febc2e,32px 0 0 #28c840;margin-right:46px;}
  .console-head .lbl{color:#9fb0bd;font:600 12.5px Inter,sans-serif;}
  .console-head .lbl span{color:#56646f;font-weight:400;margin-left:8px;}
  .console-body{flex:1;margin:0;padding:14px 16px;overflow-y:auto;
        font:12px/1.7 "SF Mono",Menlo,Consolas,monospace;color:#cfe9da;}
  .cline{white-space:pre-wrap;}
  .cline.state{color:#cfe9da;} .cline.ledger{color:#8fd0ff;} .cline.rail{color:#ffd27f;}
  .cline.webhook{color:#c9a8ff;} .cline.ok{color:#67e0a3;font-weight:600;} .cline.bad{color:#ff9a8f;font-weight:600;}
  .cline.meta{color:#8a98a4;}
  .console-empty{color:#56646f;font-style:italic;}
</style>
</head>
<body>
  <div class="stage">
    <div class="phone">
      <div class="notch"></div>
      <div class="langtog"><button id="lang-en">EN</button><button id="lang-fr">FR</button></div>
      <div class="badge" id="badge">DEMO</div>
      <div class="screen">
        <label class="mpick" id="lbl-merchant" for="merchant">Merchant (you)</label>
        <select id="merchant"></select>

        <div class="hero">
          <h1 id="hero-name">—</h1>
          <div class="qrwrap"><img id="hero-qr" alt="merchant QR" /></div>
          <div class="till" id="hero-till">—</div>
          <p class="cap" id="hero-cap"></p>
        </div>

        <details class="panel" open>
          <summary id="sum-sim">Simulate a customer paying (USSD)</summary>
          <div class="body">
            <label id="lbl-sim-customer" for="sim-customer">Customer number</label>
            <input id="sim-customer" type="tel" inputmode="numeric" value="243800000001" />
            <label id="lbl-sim-amount" for="sim-amount">Amount</label>
            <input id="sim-amount" type="text" inputmode="decimal" value="10.00" />
            <button class="cta" id="sim-pay">Pay via USSD</button>
            <div id="sim-out" class="out hidden"></div>
          </div>
        </details>

        <div class="feed">
          <div class="feed-head"><span id="lbl-recent">Recent payments</span><button id="refresh">⟳</button></div>
          <ul id="feed-list"></ul>
        </div>

        <details class="panel">
          <summary id="sum-charge">Charge a customer by number (fallback)</summary>
          <div class="body">
            <label id="lbl-chg-customer" for="chg-customer">Customer number</label>
            <input id="chg-customer" type="tel" inputmode="numeric" value="243800000001" />
            <label id="lbl-chg-amount" for="chg-amount">Amount</label>
            <input id="chg-amount" type="text" inputmode="decimal" value="10.00" />
            <label id="lbl-chg-scenario" for="chg-scenario">pawaPay simulator (demo)</label>
            <select id="chg-scenario">
              <option value="success"></option>
              <option value="payout_fail"></option>
              <option value="collection_fail"></option>
              <option value="refund_fail"></option>
            </select>
            <button class="cta" id="chg-btn">Charge</button>
            <div id="chg-out" class="out hidden"></div>
          </div>
        </details>

        <div id="err" class="err hidden"></div>
      </div>
    </div>

    <aside class="console">
      <div class="console-head">
        <span class="lights"></span>
        <span class="lbl">operations <span>— live trace from the API (collect → settle → refund)</span></span>
      </div>
      <div class="console-body" id="console-body"></div>
    </aside>
  </div>

  <div class="hint" id="hint"></div>

<script>
  const API = new URLSearchParams(location.search).get("api") || "http://127.0.0.1:8000";
  const $ = (id) => document.getElementById(id);

  const I18N = {
    en: {
      demo: "DEMO", merchant: "Merchant (you)",
      cap: (n) => `Customers scan or dial to pay <b>${n}</b> — no app or internet needed on their side.`,
      simTitle: "Simulate a customer paying (USSD)", customer: "Customer number", amount: "Amount",
      payUssd: "Pay via USSD", paying: "Dialing…",
      recent: "Recent payments", empty: "No payments yet — simulate one above.",
      chargeTitle: "Charge a customer by number (fallback)", simNote: "pawaPay simulator (demo)",
      charge: "Charge", scenarios: { success: "Payment succeeds", payout_fail: "Settlement fails → refund",
        collection_fail: "Charge fails", refund_fail: "Refund fails → review" },
      states: { initiated:"initializing", collection_pending:"awaiting approval", collection_succeeded:"received",
        payout_pending:"settling", payout_succeeded:"paid", payout_failed:"settle failed",
        refund_pending:"refunding", refunded:"reversed", collection_failed:"declined", manual_review:"review" },
      simDone: (a,n) => `Customer approved. ${a} USD paid to ${n}.`,
      err: (e) => `Couldn't reach the API at ${API}. Is it running? ${e}`,
      hint: "Backend at", start: "start", consoleEmpty: "// charge a customer to trace every operation",
    },
    fr: {
      demo: "DÉMO", merchant: "Commerçant (vous)",
      cap: (n) => `Les clients scannent ou composent pour payer <b>${n}</b> — sans appli ni internet de leur côté.`,
      simTitle: "Simuler un paiement client (USSD)", customer: "Numéro du client", amount: "Montant",
      payUssd: "Payer par USSD", paying: "Composition…",
      recent: "Paiements récents", empty: "Aucun paiement — simulez-en un ci-dessus.",
      chargeTitle: "Débiter un client par numéro (secours)", simNote: "Simulateur pawaPay (démo)",
      charge: "Encaisser", scenarios: { success: "Paiement réussi", payout_fail: "Échec règlement → remboursement",
        collection_fail: "Échec du débit", refund_fail: "Remboursement échoué → vérification" },
      states: { initiated:"initialisation", collection_pending:"en attente d'accord", collection_succeeded:"reçu",
        payout_pending:"règlement", payout_succeeded:"payé", payout_failed:"échec règlement",
        refund_pending:"remboursement", refunded:"annulé", collection_failed:"refusé", manual_review:"vérification" },
      simDone: (a,n) => `Client a approuvé. ${a} USD payé à ${n}.`,
      err: (e) => `Impossible de joindre l'API sur ${API}. Démarrée ? ${e}`,
      hint: "Backend sur", start: "démarrez", consoleEmpty: "// encaissez un client pour tracer chaque opération",
    },
  };

  let lang = "en";
  let merchants = [];
  const current = () => merchants.find((m) => m.id === $("merchant").value) || merchants[0];

  function applyStaticText() {
    const t = I18N[lang];
    $("badge").textContent = t.demo;
    $("lbl-merchant").textContent = t.merchant;
    $("sum-sim").textContent = t.simTitle;
    $("lbl-sim-customer").textContent = t.customer;
    $("lbl-sim-amount").textContent = t.amount;
    $("sim-pay").textContent = t.payUssd;
    $("lbl-recent").textContent = t.recent;
    $("sum-charge").textContent = t.chargeTitle;
    $("lbl-chg-customer").textContent = t.customer;
    $("lbl-chg-amount").textContent = t.amount;
    $("lbl-chg-scenario").textContent = t.simNote;
    $("chg-btn").textContent = t.charge;
    for (const opt of $("chg-scenario").options) opt.textContent = t.scenarios[opt.value] || opt.value;
    $("hint").innerHTML = `${t.hint} <code>${API}</code> — ${t.start}: <code>uvicorn --app-dir src drc_pay_api.main:app</code>`;
    $("lang-en").classList.toggle("active", lang === "en");
    $("lang-fr").classList.toggle("active", lang === "fr");
    renderHero();
  }
  function setLang(l) { lang = l; applyStaticText(); renderFeed(); }

  function showErr(e) { $("err").textContent = I18N[lang].err(e); $("err").classList.remove("hidden"); }

  async function loadMerchants() {
    try {
      merchants = await (await fetch(`${API}/merchants`)).json();
    } catch (e) { showErr(e); return; }
    const sel = $("merchant");
    sel.innerHTML = merchants.map((m) => `<option value="${m.id}">${m.name} · ${m.ussd_string}</option>`).join("");
    renderHero();
    renderFeed();
  }

  function renderHero() {
    const m = current(); if (!m) return;
    $("hero-name").textContent = m.name;
    $("hero-qr").src = `${API}${m.qr_svg_path}`;
    $("hero-till").textContent = m.ussd_string;
    $("hero-cap").innerHTML = I18N[lang].cap(m.name);
  }

  async function renderFeed() {
    const m = current(); if (!m) return;
    let txns = [];
    try { txns = await (await fetch(`${API}/transactions`)).json(); } catch (e) { return; }
    const mine = txns.filter((tx) => tx.merchant_id === m.id).reverse().slice(0, 8);
    const t = I18N[lang];
    const list = $("feed-list");
    if (!mine.length) { list.innerHTML = `<li class="empty">${t.empty}</li>`; return; }
    list.innerHTML = mine.map((tx) => {
      const cls = tx.state === "payout_succeeded" ? "ok"
        : (tx.state === "collection_pending" || tx.state === "payout_pending") ? "wait" : "bad";
      return `<li><span><span class="amt">${tx.amount} ${tx.currency}</span>
        <div class="who">${tx.customer_msisdn}</div></span>
        <span class="pill ${cls}">${t.states[tx.state] || tx.state}</span></li>`;
    }).join("");
  }

  async function simPay() {
    $("err").classList.add("hidden");
    const m = current(); if (!m) return;
    const msisdn = $("sim-customer").value.trim();
    const amount = $("sim-amount").value.trim();
    const sid = "mock-" + Date.now();
    const out = $("sim-out");
    $("sim-pay").disabled = true; $("sim-pay").textContent = I18N[lang].paying;
    try {
      // Dial-through: *123*<till>*<amount># arrives pre-filled → confirm prompt → confirm.
      const dial = `${m.short_code}*${amount}`;
      await fetch(`${API}/ussd`, { method: "POST", headers: { "content-type": "application/json" },
        body: JSON.stringify({ session_id: sid, msisdn, text: dial }) });
      const res = await fetch(`${API}/ussd`, { method: "POST", headers: { "content-type": "application/json" },
        body: JSON.stringify({ session_id: sid, msisdn, text: `${dial}*1` }) });
      const wire = await res.text(); // "END Payment of ... initiated. Approve on your phone."
      out.className = "out ok"; out.textContent = I18N[lang].simDone(amount, m.name);
      out.classList.remove("hidden");
    } catch (e) { out.className = "out bad"; out.textContent = String(e); out.classList.remove("hidden"); }
    $("sim-pay").disabled = false; $("sim-pay").textContent = I18N[lang].payUssd;
    renderFeed();
  }

  async function chargeByNumber() {
    $("err").classList.add("hidden");
    const m = current(); if (!m) return;
    const payload = { customer_msisdn: $("chg-customer").value.trim(), merchant_id: m.id,
      amount: $("chg-amount").value.trim(), currency: "USD", scenario: $("chg-scenario").value };
    const out = $("chg-out");
    $("chg-btn").disabled = true;
    let body;
    try {
      const res = await fetch(`${API}/transactions`, { method: "POST",
        headers: { "content-type": "application/json" }, body: JSON.stringify(payload) });
      body = await res.json();
      if (!res.ok) throw new Error(body.detail || `HTTP ${res.status}`);
    } catch (e) { out.className = "out bad"; out.textContent = String(e); out.classList.remove("hidden");
      $("chg-btn").disabled = false; return; }
    const net = (Math.round(parseFloat(body.amount) * 100) - Math.round(parseFloat(body.fee) * 100)) / 100;
    const ok = body.state === "payout_succeeded";
    out.className = "out " + (ok ? "ok" : "bad");
    out.textContent = `${I18N[lang].states[body.state] || body.state} · net ${ok ? net.toFixed(2) : "0.00"} ${body.currency}`;
    out.classList.remove("hidden");
    renderTrace(body.trace || []);
    $("chg-btn").disabled = false;
    renderFeed();
  }

  function classify(line) {
    if (line.startsWith("ledger")) return "ledger";
    if (line.startsWith("state")) return "state";
    if (line.startsWith("rail")) return "rail";
    if (line.startsWith("webhook")) return "webhook";
    if (line.startsWith("✓")) return "ok";
    if (line.startsWith("✕") || line.startsWith("⚠")) return "bad";
    return "meta";
  }
  function renderTrace(trace) {
    const body = $("console-body");
    if (!trace.length) { body.innerHTML = `<div class="console-empty">${I18N[lang].consoleEmpty}</div>`; return; }
    body.innerHTML = trace.map((l) => `<div class="cline ${classify(l)}">${l.replace(/</g, "&lt;")}</div>`).join("");
    body.scrollTop = body.scrollHeight;
  }

  $("merchant").addEventListener("change", () => { renderHero(); renderFeed(); });
  $("sim-pay").addEventListener("click", simPay);
  $("chg-btn").addEventListener("click", chargeByNumber);
  $("refresh").addEventListener("click", renderFeed);
  $("lang-en").addEventListener("click", () => setLang("en"));
  $("lang-fr").addEventListener("click", () => setLang("fr"));

  applyStaticText();
  $("console-body").innerHTML = `<div class="console-empty">${I18N[lang].consoleEmpty}</div>`;
  loadMerchants();
  setInterval(renderFeed, 5000);
</script>
</body>
</html>

# Render Blueprint — deploy the DRC Pay sandbox demo (API + Merchant Console + Postgres) as
# one service. One-time in the Render dashboard: set the two secret env vars marked
# `sync: false` (your pawaPay sandbox token + public key). The Basic-auth password is
# auto-generated — read it under the service's Environment tab and share it with testers.
# Full steps: docs/deploy-render.md.
databases:
  - name: drc-pay-db
    plan: free              # free for 90 days, then ~$6/mo (or "basic-256mb")

services:
  - type: web
    name: drc-pay-sandbox
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free              # sleeps after ~15 min idle (slow first hit); "starter" ($7/mo) = always-on
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: DRCPAY_ENVIRONMENT
        value: sandbox
      - key: DRCPAY_PAWAPAY_BASE_URL
        value: https://api.sandbox.pawapay.io
      - key: DRCPAY_PAWAPAY_API_TOKEN
        sync: false          # set in the dashboard — your sandbox token (secret)
      - key: DRCPAY_PAWAPAY_PUBLIC_KEY
        sync: false          # set in the dashboard — for signed callbacks (secret)
      - key: DRCPAY_BASIC_AUTH_PASSWORD
        generateValue: true  # Render generates a strong password; share it with testers
      - key: DRCPAY_DATABASE_URL
        fromDatabase:
          name: drc-pay-db
          property: connectionString

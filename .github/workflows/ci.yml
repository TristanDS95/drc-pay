name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    name: API (Python)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
      - name: Install
        run: pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check .
      - name: Format (ruff)
        run: ruff format --check .
      - name: Type-check (mypy)
        run: mypy src
      - name: Test (pytest)
        run: pytest

  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Secret scan (gitleaks)
        run: |
          curl -sSL https://github.com/gitleaks/gitleaks/releases/download/v8.30.1/gitleaks_8.30.1_linux_x64.tar.gz -o gl.tgz
          tar -xzf gl.tgz gitleaks
          ./gitleaks git . --redact -v

  # mobile job — add when the mobile app exists (see docs/future-dev.md): lint + type-check + EAS build.
